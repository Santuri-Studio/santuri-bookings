<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Santuri East Africa Bookings</title>

<link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:#f7f7f7;
    color:#222;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:40px 20px;
}

.container{
    width:100%;
    max-width:900px;
}

.card{
    background:#fff;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
    border:1px solid #e6e6e6;
}

.header{
    text-align:center;
    padding:50px 40px;
    border-bottom:1px solid #eee;
}

.logo{
    width:110px;
    margin-bottom:25px;
}

h1{
    font-size:2.2rem;
    margin-bottom:12px;
    font-weight:600;
}

.header p{
    color:#666;
    max-width:650px;
    margin:auto;
    line-height:1.6;
}

.services{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:30px;
    padding:40px;
}

.service{
    border:1px solid #e5e5e5;
    border-radius:14px;
    padding:30px;
    transition:.25s;
}

.service:hover{
    transform:translateY(-4px);
    box-shadow:0 12px 24px rgba(0,0,0,.08);
}

.service h2{
    margin-bottom:15px;
    font-size:1.4rem;
}

.service p{
    color:#666;
    line-height:1.6;
    margin-bottom:30px;
}

button{
    background:#111;
    color:white;
    border:none;
    border-radius:8px;
    padding:14px 24px;
    font-size:15px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#333;
}

.footer{
    text-align:center;
    padding:25px;
    border-top:1px solid #eee;
    color:#888;
    font-size:.9rem;
}

@media(max-width:700px){

    .header{
        padding:40px 25px;
    }

    .services{
        padding:25px;
    }

}
</style>

</head>

<body>

<div class="container">

<div class="card">

<div class="header">

<!-- Replace with your own logo -->
<!-- <img class="logo" src="logo.png" alt="Santuri East Africa"> -->

<h1>Santuri East Africa Bookings</h1>

<p>
Choose the service you'd like to book.
</p>

</div>

<div class="services">

<div class="service">

<h2>🎙 Studio Booking</h2>

<p>
Book recording, production, mixing or collaborative studio sessions.
</p>

<button onclick="Calendly.initPopupWidget({
url:'https://calendly.com/studio-santuri/studio-bookings'
});return false;">
Book Studio
</button>

</div>

<div class="service">

<h2>🎧 DJ Practice Session</h2>

<p>
Reserve time on our professional Pioneer DJ setup to practice your sets.
</p>

<button onclick="Calendly.initPopupWidget({
url:'https://calendly.com/djpractice-santuri/30min?primary_color=787878'
});return false;">
Book DJ Practice
</button>

</div>

</div>

<div class="footer">
Santuri East Africa
</div>

</div>

</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>

</body>
</html>
