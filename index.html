<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santuri Studio Booking</title>

    <!-- Calendly CSS -->
    <link href="https://assets.calendly.com/assets/external/widget.css" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #111;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        .card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.35);
        }

        .header {
            text-align: center;
            padding: 40px 30px 20px;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            color: #b5b5b5;
            font-size: 1rem;
        }

        .booking {
            padding: 20px;
        }

        .booking h2 {
            margin-bottom: 15px;
            font-size: 1.4rem;
            font-weight: 500;
        }

        .calendly-inline-widget {
            min-width: 320px;
            height: 750px;
            margin-bottom: 50px;
        }

        @media (max-width: 768px) {
            body {
                padding: 20px 10px;
            }

            .header {
                padding: 30px 20px 15px;
            }

            h1 {
                font-size: 1.6rem;
            }

            .booking {
                padding: 10px;
            }

            .calendly-inline-widget {
                height: 700px;
                margin-bottom: 40px;
            }
        }
    </style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="header">
            <h1>Santuri Studio</h1>
            <p>Select a service below to make your booking.</p>
        </div>

        <div class="booking">

            <h2>Studio Bookings</h2>

            <div
                class="calendly-inline-widget"
                data-url="https://calendly.com/studio-santuri/studio-bookings">
            </div>

            <h2>DJ Practice Sessions</h2>

            <div
                class="calendly-inline-widget"
                data-url="https://calendly.com/djpractice-santuri/30min?primary_color=787878">
            </div>

        </div>

    </div>

</div>

<!-- Calendly Script (only once) -->
<script src="https://assets.calendly.com/assets/external/widget.js"></script>

</body>
</html>
